<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 – Page Not Found | Md Fokhrul Islam</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent:  #1a73e8;
      --text:    #202124;
      --muted:   #5f6368;
      --border:  #e8eaed;
      --card-bg: #f8f9fa;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Navbar */
    .site-nav {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0.65rem 0;
    }
    .site-nav .brand {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text) !important;
    }
    .site-nav .nav-link {
      color: var(--muted) !important;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.25rem 0.6rem !important;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .site-nav .nav-link:hover {
      color: var(--text) !important;
      background: var(--card-bg);
      text-decoration: none;
    }

    /* 404 content */
    .error-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 1rem;
    }
    .error-code {
      font-size: 7rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    .error-desc {
      color: var(--muted);
      font-size: 0.97rem;
      max-width: 420px;
      margin: 0 auto 2rem;
    }
    .btn-home {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.55rem 1.5rem;
      border-radius: 6px;
      font-size: 0.93rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-home:hover {
      background: #1558b0;
      color: #fff;
      text-decoration: none;
    }

    /* Footer */
    footer {
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      padding: 1.2rem 0;
      text-align: center;
      font-size: 0.82rem;
      color: #adb5bd;
    }
    footer a { color: #adb5bd; }
    footer a:hover { color: var(--muted); }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="site-nav navbar navbar-expand-md">
    <div class="container">
      <a class="navbar-brand brand" href="/">Md Fokhrul Islam</a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navMenu">
        <ul class="navbar-nav gap-1">
          <li class="nav-item"><a class="nav-link" href="/#about">About</a></li>
          <li class="nav-item"><a class="nav-link" href="/#publications">Publications</a></li>
          <li class="nav-item"><a class="nav-link" href="/#research">Research</a></li>
          <li class="nav-item"><a class="nav-link" href="/#projects">Projects</a></li>
          <li class="nav-item"><a class="nav-link" href="/#awards">Awards</a></li>
          <li class="nav-item"><a class="nav-link" href="/#contact">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="/files/cv.pdf" target="_blank">CV</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- 404 content -->
  <div class="error-section">
    <div>
      <div class="error-code">404</div>
      <div class="error-title">Page Not Found</div>
      <p class="error-desc">
        The page you're looking for doesn't exist or may have been moved.
      </p>
      <a href="/" class="btn-home">
        <i class="fas fa-home me-2"></i>Back to Home
      </a>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p class="mb-0">
        &copy; 2025 Md Fokhrul Islam &nbsp;·&nbsp;
        Design inspired by <a href="https://github.com/alshedivat/al-folio" target="_blank">al-folio</a>
      </p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
